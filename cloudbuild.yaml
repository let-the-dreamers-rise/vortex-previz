steps:
  # Build the frontend and bundle it into backend/static for Cloud Run serving
  - name: 'node:20'
    entrypoint: bash
    args:
      - '-lc'
      - |
        npm install
        npm run build
        rm -rf backend/static
        mkdir -p backend/static
        cp -r dist/* backend/static/

  # Build the backend Docker image (now includes bundled frontend)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vortex-previz-app', './backend']

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vortex-previz-app']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vortex-previz-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vortex-previz-app'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=AIzaSyBHlFpq9ltUZjKpS_nidEQH4nA1wbz7s1g,GOOGLE_GENAI_USE_VERTEXAI=false'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '300s'

images:
  - 'gcr.io/$PROJECT_ID/vortex-previz-app'
