<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#0a0a1a" stroke="url(#g)" stroke-width="2"/>
  <g transform="translate(32,32)">
    <!-- DNA helix -->
    <path d="M-8,-18 Q0,-12 8,-6 Q0,0 -8,6 Q0,12 8,18" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8,-18 Q0,-12 -8,-6 Q0,0 8,6 Q0,12 -8,18" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Crossing bars -->
    <line x1="-6" y1="-12" x2="6" y2="-12" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-7" y1="3" x2="7" y2="3" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="-6" y1="12" x2="6" y2="12" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <!-- Glow dots at intersections -->
    <circle cx="0" cy="-12" r="2" fill="#06b6d4"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff"/>
    <circle cx="0" cy="12" r="2" fill="#8b5cf6"/>
  </g>
</svg>
